<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live QR Display</title>
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #0b1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; margin: 0; position: relative; overflow: hidden; }
    
    /* Audio Unlock Overlay - REMOVED */
    #audioUnlock {
      display: none !important;
    }

    /* Language Selector Badge (Top Left) */
    .language-badge {
      position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.1);
      border: 1px solid #4f7a7a; padding: 6px 12px; border-radius: 20px;
      display: flex; align-items: center; gap: 6px; z-index: 100;
    }
    
    .language-badge select {
      background: transparent; color: #b0d4cc; border: none; font-size: 15px; font-weight: bold;
      outline: none; cursor: pointer; appearance: none; -webkit-appearance: none;
    }
    .language-badge select option { color: #0b1a1a; background: #eaf5f0; }

    /* Device Code Badge (Top Right) */
    .device-code-badge {
      position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.1);
      border: 1px solid #4f7a7a; padding: 8px 16px; border-radius: 20px;
      font-size: 14px; font-weight: bold; color: #b0d4cc; display: flex; align-items: center; gap: 6px; transition: all 0.3s ease; z-index: 100;
    }

    .display-container {
      background: #172b2b; padding: 50px 40px; border-radius: 40px;
      box-shadow: 0 25px 50px rgba(0, 20, 10, 0.9); text-align: center;
      max-width: 600px; width: 90%; border: 1px solid rgba(255,255,255,0.05);
      display: flex; flex-direction: column; align-items: center;
    }

    .amount-display { font-size: 56px; font-weight: 800; color: #1db954; margin-bottom: 30px; letter-spacing: -1px; display: none; }
    .qr-box { background: white; padding: 24px; border-radius: 32px; display: inline-block; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: transform 0.3s ease; }
    .qr-box.pulse { transform: scale(1.05); }
    #qrContainer { width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }
    .status-text { font-size: 20px; color: #b0d4cc; font-weight: 500; line-height: 1.4; }
    .waiting-spinner { border: 5px solid rgba(255, 255, 255, 0.1); border-top: 5px solid #1db954; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Success Screen Animation CSS */
    .success-screen {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .success-icon { font-size: 120px; color: #1db954; margin-bottom: 20px; }
    .success-text { font-size: 32px; font-weight: bold; color: white; margin-bottom: 10px; }
    .success-amount { font-size: 56px; color: #1db954; font-weight: 900; }
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

  <!-- Audio unlock screen - FULLY DISABLED -->
  <div id="audioUnlock" style="display:none !important;"></div>

  <!-- Language Selector -->
  <div class="language-badge">
    <span class="material-icons" style="font-size:18px; color:#1db954;">language</span>
    <select id="langSelect">
      <option value="bn">বাংলা (Bengali)</option>
      <option value="en">English</option>
      <option value="hi">हिन्दी (Hindi)</option>
    </select>
  </div>

  <!-- Pairing Code Display -->
  <div class="device-code-badge" id="codeBadge">
    <span class="material-icons" style="font-size:18px;">cast</span>
    Code: <span id="myCodeDisplay">------</span>
  </div>

  <div class="display-container">
    <!-- NORMAL QR MODE -->
    <div id="normalMode" style="display:flex; flex-direction:column; align-items:center; width:100%;">
      <div class="amount-display" id="amountDisplay">₹0.00</div>
      <div class="qr-box" id="qrWrapper">
        <div id="qrContainer"><div class="waiting-spinner" id="spinner"></div></div>
      </div>
      <div class="status-text" id="statusText">মেইন অ্যাপের সাথে কানেক্ট করুন...</div>
    </div>

    <!-- SUCCESS MODE -->
    <div id="successScreen" class="success-screen">
      <span class="material-icons success-icon">check_circle</span>
      <div class="success-text">Payment Successful!</div>
      <div class="success-amount" id="successAmountDisplay">₹ 0.00</div>
    </div>
  </div>

  <script>
    // 1. Language Preference Save/Load
    const langSelect = document.getElementById('langSelect');
    const savedLang = localStorage.getItem('displayLanguage') || 'bn';
    langSelect.value = savedLang;
    langSelect.addEventListener('change', (e) => {
      localStorage.setItem('displayLanguage', e.target.value);
    });

    // 2. Auto-unlock audio context
    if ('speechSynthesis' in window) {
      let silentUtterance = new SpeechSynthesisUtterance('');
      speechSynthesis.speak(silentUtterance);
    }
    if (window.AudioContext || window.webkitAudioContext) {
      try {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') {
          ctx.resume();
        }
      } catch(e) {}
    }

    // ----- FIREBASE CONFIG -----
    const firebaseConfig = {
      apiKey: "AIzaSyCkNqoGvvIhWivgC_P9PDUvEQ0VS5N6SI0",
      authDomain: "photography-9628b.firebaseapp.com",
      databaseURL: "https://photography-9628b-default-rtdb.firebaseio.com",
      projectId: "photography-9628b",
      storageBucket: "photography-9628b.firebasestorage.app",
      messagingSenderId: "829346814544",
      appId: "1:829346814544:web:1f9ee0722dfa83fef44f55"
    };

    let myCode = localStorage.getItem('uniqueDisplayCode');
    if (!myCode) {
      myCode = Math.floor(100000 + Math.random() * 900000).toString();
      localStorage.setItem('uniqueDisplayCode', myCode);
    }
    document.getElementById('myCodeDisplay').innerText = myCode;

    // ----- SOUND BOX STYLE MUSIC (Same as phone sound box) -----
    function playSuccessMusic(callback) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) { if(callback) callback(); return; }
      const ctx = new AudioContext();
      
      // 🎵 Sound box style - phone cash register sound
      // Cash register "DING" - bright and clear
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.connect(gain1);
      gain1.connect(ctx.destination);
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(1200, ctx.currentTime);
      osc1.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15);
      gain1.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain1.gain.linearRampToValueAtTime(1.0, ctx.currentTime + 0.02);
      gain1.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.2);
      osc1.start(ctx.currentTime);
      osc1.stop(ctx.currentTime + 0.2);

      // Second "KA-CHING" sound
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(600, ctx.currentTime + 0.2);
      osc2.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.4);
      gain2.gain.setValueAtTime(0.0001, ctx.currentTime + 0.2);
      gain2.gain.linearRampToValueAtTime(0.8, ctx.currentTime + 0.25);
      gain2.gain.exponentialRampToValueAtTime(0.05, ctx.currentTime + 0.5);
      osc2.start(ctx.currentTime + 0.2);
      osc2.stop(ctx.currentTime + 0.5);

      // Success chime - happy ascending
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const startTime = ctx.currentTime + 0.4 + (i * 0.12);
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.linearRampToValueAtTime(0.7, startTime + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.1, startTime + 0.15);
        osc.start(startTime);
        osc.stop(startTime + 0.18);
      });

      // Final chord - celebratory
      const chord = [523, 659, 784];
      chord.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const startTime = ctx.currentTime + 0.9;
        gain.gain.setValueAtTime(0.0001, startTime + (i * 0.05));
        gain.gain.linearRampToValueAtTime(0.5, startTime + 0.1 + (i * 0.05));
        gain.gain.exponentialRampToValueAtTime(0.05, startTime + 0.6 + (i * 0.05));
        osc.start(startTime + (i * 0.05));
        osc.stop(startTime + 0.7 + (i * 0.05));
      });

      setTimeout(() => { if(callback) callback(); }, 1500);
    }

    // ----- VOICE ANNOUNCEMENT - Sound box style, same as phone -----
    function playSuccessSequence(amount) {
      if (!('speechSynthesis' in window)) return;
      
      // Play sound box music first
      playSuccessMusic(() => {
         const lang = document.getElementById('langSelect').value;
         let text = "";
         let voiceLang = "";
         
         // Clean amount - no .00
         let cleanAmount = parseFloat(amount);
         let displayAmount = cleanAmount % 1 === 0 ? cleanAmount.toString() : cleanAmount.toFixed(2);
         
         // Sound box style announcements - same as phone
         if(lang === 'bn') {
             text = displayAmount + " টাকা পেমেন্ট সফলভাবে গ্রহণ করা হয়েছে।";
             voiceLang = 'bn-IN';
         } else if(lang === 'hi') {
             text = displayAmount + " रुपये का पेमेंट सफलतापूर्वक प्राप्त हुआ।";
             voiceLang = 'hi-IN';
         } else {
             text = "Payment of " + displayAmount + " rupees received successfully.";
             voiceLang = 'en-IN';
         }
         
         const utterance = new SpeechSynthesisUtterance(text);
         utterance.rate = 0.9;
         utterance.pitch = 1.0;
         utterance.lang = voiceLang;
         utterance.volume = 1; // MAX LOUD
         
         // Get proper voice
         const voices = speechSynthesis.getVoices();
         if (lang === 'bn') {
           const bnVoice = voices.find(v => v.lang.includes('bn-IN') || v.lang.includes('bn'));
           if (bnVoice) utterance.voice = bnVoice;
         } else if (lang === 'hi') {
           const hiVoice = voices.find(v => v.lang.includes('hi-IN') || v.lang.includes('hi'));
           if (hiVoice) utterance.voice = hiVoice;
         } else {
           const enVoice = voices.find(v => v.lang.includes('en-IN') || v.lang.includes('en'));
           if (enVoice) utterance.voice = enVoice;
         }
         
         utterance.onend = () => {
             // Play outro music
             playSuccessMusic(null);
         };
         
         speechSynthesis.speak(utterance);
      });
    }

    try {
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      
      const qrContainer = document.getElementById('qrContainer');
      const qrWrapper = document.getElementById('qrWrapper');
      const statusText = document.getElementById('statusText');
      const amountDisplay = document.getElementById('amountDisplay');
      const codeBadge = document.getElementById('codeBadge');
      
      const normalMode = document.getElementById('normalMode');
      const successScreen = document.getElementById('successScreen');
      const successAmountDisplay = document.getElementById('successAmountDisplay');

      function extractAmountFromURI(uri) {
        try {
          const queryString = uri.split('?')[1];
          if (!queryString) return '0.00';
          return new URLSearchParams(queryString).get('am') || '0.00';
        } catch (e) { return '0.00'; }
      }

      let lastPlayedTimestamp = null;

      db.collection('displays').doc(myCode).onSnapshot((doc) => {
        if (doc.exists) {
          const data = doc.data();

          if (data.status === 'success') {
             normalMode.style.display = 'none';
             successScreen.style.display = 'flex';
             
             // Display only main amount
             let displayAmount = parseFloat(data.amount);
             let formattedAmount = displayAmount % 1 === 0 ? displayAmount.toString() : displayAmount.toFixed(2);
             successAmountDisplay.innerText = `₹ ${formattedAmount}`;

             codeBadge.innerHTML = `<span class="material-icons" style="font-size:18px;">check_circle</span> Paid`;
             codeBadge.style.background = 'rgba(29, 185, 84, 0.2)';
             codeBadge.style.color = '#1db954';
             codeBadge.style.borderColor = '#1db954';

             let currentTimestamp = data.timestamp ? data.timestamp.toMillis() : 0;
             if (lastPlayedTimestamp !== currentTimestamp) {
                 lastPlayedTimestamp = currentTimestamp;
                 playSuccessSequence(data.amount);
             }
             return; 
          } 
          
          normalMode.style.display = 'flex';
          successScreen.style.display = 'none';

          if (data.status === 'connected') {
            codeBadge.innerHTML = `<span class="material-icons" style="font-size:18px;">wifi</span> Connected: ${myCode}`;
            codeBadge.style.background = 'rgba(29, 185, 84, 0.2)';
            codeBadge.style.color = '#1db954';
            codeBadge.style.borderColor = '#1db954';

            if (!data.qr) {
              statusText.innerHTML = "✅ মেইন অ্যাপের সাথে কানেক্ট হয়েছে!<br><small style='color:#b0d4cc; font-size:15px;'>পেমেন্টের জন্য অপেক্ষা করা হচ্ছে...</small>";
              statusText.style.color = "#1db954";
              amountDisplay.style.display = 'none';
              qrContainer.innerHTML = '<div class="waiting-spinner" id="spinner"></div>';
            }
          } 
          else if (data.status === 'disconnected') {
            codeBadge.innerHTML = `<span class="material-icons" style="font-size:18px;">cast</span> Code: ${myCode}`;
            codeBadge.style.background = 'rgba(198, 40, 40, 0.2)';
            codeBadge.style.color = '#ef9a9a';
            codeBadge.style.borderColor = '#ef9a9a';
            
            qrContainer.innerHTML = '<div class="waiting-spinner" id="spinner"></div>';
            amountDisplay.style.display = 'none';
            statusText.innerHTML = "⚠️ মেইন অ্যাপ থেকে ডিসকানেক্ট করা হয়েছে!";
            statusText.style.color = "#ef9a9a";
          }

          if (data.qr && data.status !== 'success') {
            const amount = extractAmountFromURI(data.qr);
            let displayAmount = parseFloat(amount);
            let formattedAmount = displayAmount % 1 === 0 ? displayAmount.toString() : displayAmount.toFixed(2);
            amountDisplay.innerText = `₹ ${formattedAmount}`;
            amountDisplay.style.display = 'block';
            
            qrContainer.innerHTML = ''; 
            new QRCode(qrContainer, {
              text: data.qr, width: 300, height: 300,
              colorDark: '#0f3b3b', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H
            });

            statusText.innerHTML = "Scan to Pay";
            statusText.style.color = "#1db954";
            
            qrWrapper.classList.add('pulse');
            setTimeout(() => qrWrapper.classList.remove('pulse'), 300);
          }
        }
      }, (error) => {
        console.error("Sync Error: ", error);
        statusText.innerHTML = "ইন্টারনেট কানেকশন চেক করুন!";
        statusText.style.color = "#ef9a9a";
      });

    } catch (e) {
      document.getElementById('statusText').innerText = "সিস্টেম চালু হতে সমস্যা হচ্ছে।";
    }
  </script>
</body>
</html>
